  <rect x="780" y="200" width="100" height="34" rx="17" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="830" y="222" font-family="sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">AWS</text>

  <rect x="898" y="200" width="156" height="34" rx="17" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="976" y="222" font-family="sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">Cloud Architect</text>

  <rect x="780" y="250" width="130" height="34" rx="17" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="845" y="272" font-family="sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">Eng Leadership</text>

  <rect x="928" y="250" width="120" height="34" rx="17" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="988" y="272" font-family="sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">System Design</text>

  <rect x="780" y="300" width="100" height="34" rx="17" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="830" y="322" font-family="sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">Node.js</text>

  <rect x="898" y="300" width="88" height="34" rx="17" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="942" y="322" font-family="sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">React</text>

  <rect x="1004" y="300" width="96" height="34" rx="17" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="1052" y="322" font-family="sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">DevOps</text>

  <rect x="780" y="350" width="116" height="34" rx="17" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="838" y="372" font-family="sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">Microservices</text>

  <rect x="914" y="350" width="96" height="34" rx="17" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="962" y="372" font-family="sans-serif" font-size="14" fill="#10b981" text-anchor="middle">FinTech</text>

  <rect x="1028" y="350" width="72" height="34" rx="17" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
