<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1.5" fill="rgba(0,0,0,0.18)"/>
    </pattern>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(51,255,124,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#33ff7c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#060a07" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060a07"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Terminal window -->
  <rect x="90" y="80" width="1020" height="470" rx="10" fill="#0f1a12" stroke="rgba(51,255,124,0.25)" stroke-width="2"/>
  <rect x="90" y="80" width="1020" height="44" rx="10" fill="rgba(255,255,255,0.05)"/>
  <rect x="90" y="112" width="1020" height="12" fill="rgba(255,255,255,0.05)"/>
  <circle cx="120" cy="102" r="7" fill="#ff3860"/>
  <circle cx="144" cy="102" r="7" fill="#ffb000"/>
  <circle cx="168" cy="102" r="7" fill="#33ff7c"/>
  <text x="600" y="108" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="17" fill="#8db096">ninad@upstox :: ghostty :: 80x24</text>

  <!-- Prompt: whoami -->
  <text x="140" y="190" font-family="'JetBrains Mono',monospace" font-size="24" fill="#33ff7c">ninad@mumbai:~$ <tspan fill="#d9f2dd">whoami</tspan></text>

  <!-- Name output -->
  <text x="140" y="268" font-family="'Courier New',monospace" font-size="68" font-weight="700" fill="#d9f2dd" letter-spacing="-1">Ninad Malvankar</text>
  <text x="140" y="318" font-family="'JetBrains Mono',monospace" font-size="28" fill="#ffb000">ARCHITECT @ UPSTOX</text>

  <!-- Prompt: stats -->
  <text x="140" y="384" font-family="'JetBrains Mono',monospace" font-size="24" fill="#33ff7c">ninad@mumbai:~$ <tspan fill="#d9f2dd">ninad --stats</tspan></text>

  <!-- HUD stats -->
  <text x="140" y="436" font-family="'JetBrains Mono',monospace" font-size="22" fill="#8db096">XP <tspan fill="#33ff7c" font-weight="700">12+ YEARS</tspan>   LV <tspan fill="#3fd9ff" font-weight="700">ARCHITECT</tspan>   BADGE <tspan fill="#ffb000" font-weight="700">AWS CERTIFIED</tspan></text>
  <text x="140" y="478" font-family="'JetBrains Mono',monospace" font-size="22" fill="#8db096">ZONE <tspan fill="#ff5fd7" font-weight="700">MUMBAI, INDIA</tspan>   QUEST <tspan fill="#d9f2dd" font-weight="700">FINTECH PLATFORM</tspan></text>

  <!-- Cursor prompt -->
  <text x="140" y="528" font-family="'JetBrains Mono',monospace" font-size="24" fill="#33ff7c">ninad@mumbai:~$</text>
  <rect x="368" y="508" width="14" height="26" fill="#33ff7c"/>

  <!-- Pixel ghost sprite -->
  <g transform="translate(940,170) scale(9)" shape-rendering="crispEdges">
    <g fill="#33ff7c">
      <rect x="5" y="2" width="6" height="1"/><rect x="4" y="3" width="8" height="1"/>
      <rect x="3" y="4" width="10" height="8"/>
      <rect x="3" y="12" width="2" height="1"/><rect x="7" y="12" width="2" height="1"/><rect x="11" y="12" width="2" height="1"/>
    </g>
    <rect x="5" y="6" width="2" height="2" fill="#060a07"/><rect x="9" y="6" width="2" height="2" fill="#060a07"/>
  </g>

  <!-- Pixel star -->
  <g transform="translate(950,360) scale(5)" shape-rendering="crispEdges" fill="#ffb000">
    <rect x="7" y="1" width="2" height="2"/><rect x="6" y="3" width="4" height="2"/>
    <rect x="0" y="5" width="16" height="1"/><rect x="1" y="6" width="14" height="1"/>
    <rect x="2" y="7" width="12" height="1"/><rect x="4" y="8" width="8" height="1"/>
    <rect x="3" y="9" width="4" height="1"/><rect x="9" y="9" width="4" height="1"/>
    <rect x="2" y="10" width="4" height="1"/><rect x="10" y="10" width="4" height="1"/>
    <rect x="1" y="12" width="3" height="1"/><rect x="12" y="12" width="3" height="1"/>
  </g>

  <!-- Scanlines over everything -->
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- URL footer -->
  <text x="600" y="600" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="20" fill="rgba(51,255,124,0.75)" letter-spacing="0.06em">ninadmalvankar.com</text>
</svg>
